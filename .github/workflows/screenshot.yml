
name: TASI Liquidity Screenshot

on:
  schedule:
    - cron: "5 7 * * 0-4"
    - cron: "10 7 * * 0-4"
    - cron: "15 7 * * 0-4"
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔥 الطريقة الصحيحة لتثبيت Chrome + Driver
      - name: Install Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium webdriver-manager requests

      - name: Run TASI Engine
        env:
          SAHM_USER: ${{ secrets.SAHM_USER }}
          SAHM_PASS: ${{ secrets.SAHM_PASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python screenshot.py
          python smart_diff.py